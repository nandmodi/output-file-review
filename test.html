<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spyne Image Review Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0f7ff; }
        .spyne-blue { background-color: #2b6cb0; }
        .loading-spinner { border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top: 2px solid #fff; width: 16px; height: 16px; animation: spin 0.8s linear infinite; }
        .spinner-blue { border: 2px solid rgba(43,108,176,0.2); border-top: 2px solid #2b6cb0; border-radius: 50%; width: 24px; height: 24px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg);} 100% { transform: rotate(360deg);} }
        .page-view { display: none; min-height: 100vh; }
        .page-view.active { display: flex; flex-direction: column; }
        #page-review.active { height: calc(100vh - 56px); overflow: hidden; }
        #review-body { flex: 1; display: grid; grid-template-columns: auto 1fr; min-height: 0; overflow: hidden; }
        .vin-item { padding: 8px 12px; cursor: pointer; font-size: 12px; transition: background 0.15s; border-radius: 6px; display: flex; align-items: center; justify-content: space-between; }
        .vin-item.current { background: #dbeafe; color: #1d4ed8; font-weight: 600; border: 1px solid #93c5fd; }
        .image-tile { position: relative; background: #e2e8f0; border-radius: 8px; overflow: hidden; aspect-ratio: 4/3; cursor: zoom-in; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; }
        .dot-approved { background: #10b981; }
        .dot-rejected { background: #ef4444; }
        .dot-pending { background: #cbd5e1; }
        .issue-chip { display: inline-flex; align-items: center; gap: 6px; padding: 5px 10px; border: 1px solid #e2e8f0; border-radius: 8px; background: white; cursor: pointer; font-size: 12px; }
        .issue-chip.checked { background: #fef2f2; border-color: #fca5a5; color: #b91c1c; }
        .data-loading-overlay { position: fixed; inset: 0; background: rgba(240,247,255,0.95); z-index: 200; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
        .hidden { display: none; }
    </style>
</head>
<body class="text-slate-800">

    <header class="spyne-blue text-white px-6 py-3 flex justify-between items-center shadow-md sticky top-0 z-50 h-[56px]">
        <div class="font-bold text-lg cursor-pointer" onclick="location.reload()">SPYNE REVIEW</div>
        <div id="user-info" class="flex items-center space-x-4">
            <span id="user-email" class="text-xs"></span>
            <button onclick="logout()" class="bg-white/10 hover:bg-white/20 border border-white/20 px-3 py-1 rounded text-[10px] font-bold uppercase">Logout</button>
        </div>
    </header>

    <div id="page-auth" class="page-view active items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm border border-slate-100">
            <h1 class="text-xl font-bold text-slate-800 mb-6 text-center">Sign in</h1>
            <form id="auth-form" class="space-y-4">
                <input id="auth-email" type="email" placeholder="Email" required class="w-full p-2.5 border rounded-lg outline-none focus:border-blue-500">
                <input id="auth-password" type="password" placeholder="Password" required class="w-full p-2.5 border rounded-lg outline-none focus:border-blue-500">
                <button type="submit" class="w-full spyne-blue text-white font-semibold py-2.5 rounded-lg hover:bg-blue-700 transition">Sign in →</button>
                <p id="auth-error" class="text-xs text-red-600 text-center hidden"></p>
            </form>
        </div>
    </div>

    <div id="page-login" class="page-view items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
            <h1 class="text-xl font-bold mb-2">Select Enterprise</h1>
            <p class="text-slate-500 text-sm mb-6">This will filter Metabase_Data into All_Data sheet.</p>
            <select id="enterprise-select" class="w-full p-3 border rounded-lg mb-4 outline-none">
                <option value="" disabled selected>Loading enterprises...</option>
            </select>
            <button id="load-dealers-btn" class="w-full spyne-blue text-white font-semibold py-3 rounded-lg hover:bg-blue-700 transition">Load Teams →</button>
        </div>
    </div>

    <div id="page-dashboard" class="page-view p-8">
        <div class="max-w-7xl mx-auto w-full">
            <div class="flex justify-between items-center mb-6">
                <h2 id="current-enterprise-tag" class="text-2xl font-bold text-slate-800">Dashboard</h2>
                <input id="team-search" type="text" placeholder="Search team..." class="p-2 border rounded-lg text-sm w-64">
            </div>
            <div id="dealer-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        </div>
    </div>

    <div id="page-review" class="page-view">
        <div class="bg-white border-b px-4 py-2 flex items-center justify-between shadow-sm">
            <div class="flex items-center space-x-4">
                <button onclick="showPage('page-dashboard')" class="text-blue-600 text-sm font-bold">← Teams</button>
                <h2 id="review-team-name" class="font-bold"></h2>
                <span id="review-progress" class="text-xs bg-blue-100 text-blue-700 px-2 py-1 rounded-full"></span>
            </div>
        </div>
        <div id="review-body">
            <aside class="bg-white border-r w-[260px] overflow-y-auto p-4" id="vin-list"></aside>
            <main class="flex flex-col bg-slate-50 relative">
                <div id="current-vin-header" class="bg-white p-4 border-b flex justify-between">
                    <h2 id="current-vin-text" class="font-mono font-bold">SELECT A VIN</h2>
                    <span id="current-vin-status-badge" class="uppercase text-[10px] font-bold"></span>
                </div>
                <div id="image-area" class="flex-1 overflow-y-auto p-6 grid grid-cols-2 lg:grid-cols-4 gap-4"></div>
                <div id="review-footer" class="bg-white p-4 border-t hidden">
                    <div class="flex items-center space-x-4">
                        <label class="issue-chip" data-issue="Sequence"><input type="checkbox" class="hidden">Sequence</label>
                        <label class="issue-chip" data-issue="Banner"><input type="checkbox" class="hidden">Banner</label>
                        <label class="issue-chip" data-issue="Background"><input type="checkbox" class="hidden">Background</label>
                        <input id="review-comment" type="text" placeholder="Comment..." class="flex-1 p-2 border rounded">
                        <button id="submit-btn" class="bg-emerald-500 text-white px-6 py-2 rounded font-bold">Approve</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div id="data-loading-overlay" class="data-loading-overlay hidden">
        <div class="spinner-blue"></div>
        <p id="data-loading-msg" class="text-slate-600 font-medium">Processing...</p>
    </div>

    <script>
        // --- CONFIG ---
        const ALL_DATA_SHEET_ID = "1_0JbxBr9PaD-FWXTBmIVzv68e1it3h9Ny5ejph6sjqI";
        const GOOGLE_FORM_ACTION_URL = "https://docs.google.com/forms/d/e/1FAIpQLScVlcfx6cSrfTohohTJY9zOv4GTiKQf5d0CmLHkPEWg8VMLgA/formResponse";
        const CLIENT_NAME_ENTRY_ID = "entry.371922314";
        const REVIEW_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbyk_puhcCuKAxC3PaZqUq-hTm8jeH8iaJuXbNFX-9Zj6c3L4Voht1HD_Wr3kxvywcxK/exec";

        const AUTH_USER_PASSWORDS = { 'praveen@spyne.ai': '11135d32763e29c722e5a67de28b995c8184b26568937072f4e74e1f72c66d1f' };
        
        let allImageData = { headers: [], rows: [] };
        let selectedEnterprise = "";
        let teamsList = [];
        let vinsByTeam = new Map();
        let currentTeam = null;
        let currentVINIndex = -1;
        let reviews = {};

        // --- AUTH & NAVIGATION ---
        async function sha256(str) {
            const buf = new TextEncoder().encode(str);
            const hash = await crypto.subtle.digest('SHA-256', buf);
            return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        function showPage(id) {
            document.querySelectorAll('.page-view').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        document.getElementById('auth-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('auth-email').value.toLowerCase();
            const pass = document.getElementById('auth-password').value;
            const hash = await sha256(pass);
            if (AUTH_USER_PASSWORDS[email] === hash) {
                sessionStorage.setItem('user', email);
                initDashboard();
            } else {
                document.getElementById('auth-error').classList.remove('hidden');
                document.getElementById('auth-error').innerText = "Invalid credentials";
            }
        };

        function logout() { sessionStorage.clear(); location.reload(); }

        // --- DATA ENGINE ---
        async function initDashboard() {
            showPage('page-login');
            // Populate Enterprise Dropdown from Metabase_Data
            const metaUrl = `https://docs.google.com/spreadsheets/d/${ALL_DATA_SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Metabase_Data`;
            const res = await fetch(metaUrl);
            const text = await res.text();
            const parsed = parseCSV(text);
            const entIdx = parsed.headers.indexOf('enterprise_name');
            const ents = [...new Set(parsed.rows.map(r => r[entIdx]))].sort();
            
            const select = document.getElementById('enterprise-select');
            select.innerHTML = '<option value="" disabled selected>Select Enterprise</option>';
            ents.forEach(e => { if(e) select.innerHTML += `<option value="${e}">${e}</option>`; });
        }

        document.getElementById('load-dealers-btn').onclick = async () => {
            const select = document.getElementById('enterprise-select');
            if (!select.value) return;
            selectedEnterprise = select.value;

            const loader = document.getElementById('data-loading-overlay');
            const msg = document.getElementById('data-loading-msg');
            loader.classList.remove('hidden');

            try {
                // 1. Submit to Form
                msg.textContent = "Triggering Metabase filter...";
                const formData = new FormData();
                formData.append(CLIENT_NAME_ENTRY_ID, selectedEnterprise);
                await fetch(GOOGLE_FORM_ACTION_URL, { method: 'POST', mode: 'no-cors', body: formData });

                // 2. Polling All_Data
                let success = false;
                for(let i=0; i<5; i++) {
                    msg.textContent = `Syncing VIN data (Attempt ${i+1}/5)...`;
                    await new Promise(r => setTimeout(r, 2500));
                    const res = await fetch(`https://docs.google.com/spreadsheets/d/${ALL_DATA_SHEET_ID}/gviz/tq?tqx=out:csv&sheet=All_Data`);
                    const text = await res.text();
                    const parsed = parseCSV(text);
                    const entIdx = parsed.headers.indexOf('enterprise_name');
                    if (parsed.rows.length > 0 && parsed.rows[0][entIdx] === selectedEnterprise) {
                        allImageData = parsed;
                        success = true;
                        break;
                    }
                }
                if (!success) throw new Error("Sheet update timed out.");

                buildTeamIndex();
                renderDashboard();
                showPage('page-dashboard');
            } catch (e) { alert(e.message); }
            loader.classList.add('hidden');
        };

        function parseCSV(text) {
            const lines = text.split('\n').map(l => l.split(',').map(c => c.replace(/^"|"$/g, '').trim()));
            return { headers: lines[0], rows: lines.slice(1).filter(r => r.length > 1) };
        }

        function buildTeamIndex() {
            const h = allImageData.headers;
            const tidIdx = h.indexOf('teamId'), nameIdx = h.indexOf('ow.name'), vinIdx = h.indexOf('VIN'), urlIdx = h.indexOf('Photo URL list');
            
            const teamAgg = new Map();
            allImageData.rows.forEach(r => {
                const tid = r[tidIdx], vin = r[vinIdx];
                if(!teamAgg.has(tid)) teamAgg.set(tid, { name: r[nameIdx], vins: new Map() });
                const urls = r[urlIdx] ? r[urlIdx].split(',') : [];
                teamAgg.get(tid).vins.set(vin, urls);
            });

            teamsList = Array.from(teamAgg.entries()).map(([id, data]) => ({ id, name: data.name, vinCount: data.vins.size }));
            vinsByTeam = teamAgg;
        }

        function renderDashboard() {
            const grid = document.getElementById('dealer-grid');
            grid.innerHTML = '';
            teamsList.forEach(t => {
                grid.innerHTML += `
                    <div class="bg-white p-6 rounded-xl shadow-sm border cursor-pointer hover:border-blue-400" onclick="openTeam('${t.id}')">
                        <h3 class="font-bold text-lg">${t.name}</h3>
                        <p class="text-slate-400 text-xs mb-4">ID: ${t.id}</p>
                        <div class="flex justify-between items-center">
                            <span class="bg-blue-50 text-blue-600 px-3 py-1 rounded-full text-xs font-bold">${t.vinCount} VINs</span>
                        </div>
                    </div>
                `;
            });
        }

        // --- REVIEW ENGINE ---
        function openTeam(id) {
            currentTeam = vinsByTeam.get(id);
            currentTeam.id = id;
            document.getElementById('review-team-name').innerText = currentTeam.name;
            showPage('page-review');
            renderVINList();
        }

        function renderVINList() {
            const list = document.getElementById('vin-list');
            list.innerHTML = '<h3 class="text-[10px] font-bold text-slate-400 uppercase mb-4">VIN List</h3>';
            Array.from(currentTeam.vins.keys()).forEach((vin, idx) => {
                const item = document.createElement('div');
                item.className = `vin-item ${idx === currentVINIndex ? 'current' : ''}`;
                item.innerHTML = `<span>${vin}</span><span class="text-[10px] text-slate-400">${currentTeam.vins.get(vin).length}</span>`;
                item.onclick = () => selectVIN(vin, idx);
                list.appendChild(item);
            });
        }

        function selectVIN(vin, idx) {
            currentVINIndex = idx;
            const urls = currentTeam.vins.get(vin);
            document.getElementById('current-vin-text').innerText = vin;
            document.getElementById('review-footer').classList.remove('hidden');
            const area = document.getElementById('image-area');
            area.innerHTML = '';
            urls.forEach(url => {
                area.innerHTML += `<div class="image-tile"><img src="${url}" class="w-full h-full object-cover"></div>`;
            });
            renderVINList();
        }

        // --- SUBMISSION ---
        document.getElementById('submit-btn').onclick = async () => {
            const vin = document.getElementById('current-vin-text').innerText;
            const comment = document.getElementById('review-comment').value;
            const issues = Array.from(document.querySelectorAll('.issue-chip.checked')).map(c => c.dataset.issue);
            
            const payload = {
                reviewer: sessionStorage.getItem('user'),
                enterprise: selectedEnterprise,
                teamName: currentTeam.name,
                teamId: currentTeam.id,
                vin: vin,
                status: issues.length > 0 ? 'rejected' : 'approved',
                issues: issues,
                comment: comment,
                reviewDate: new Date().toLocaleDateString()
            };

            await fetch(REVIEW_WEBAPP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            alert("Review Submitted");
            // Move to next or reset
        };

        document.querySelectorAll('.issue-chip').forEach(c => {
            c.onclick = () => {
                c.classList.toggle('checked');
                document.getElementById('submit-btn').innerText = document.querySelectorAll('.issue-chip.checked').length > 0 ? 'Reject' : 'Approve';
                document.getElementById('submit-btn').className = document.querySelectorAll('.issue-chip.checked').length > 0 ? 'bg-rose-500 text-white px-6 py-2 rounded font-bold' : 'bg-emerald-500 text-white px-6 py-2 rounded font-bold';
            };
        });

        window.onload = () => { if(sessionStorage.getItem('user')) initDashboard(); };
    </script>
</body>
</html>
